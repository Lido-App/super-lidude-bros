<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Lidude Stack</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: #0f172a;
  color: white;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
#game { display: block; position: absolute; inset: 0; width: 100%; height: 100%; }

#hud {
  position: absolute; top: 14px; left: 14px; right: 14px;
  display: flex; justify-content: space-between;
  pointer-events: none;
  font-weight: 800;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  z-index: 5;
}
#score-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
#score {
  font-size: 42px;
  background: rgba(0,0,0,0.35);
  padding: 2px 16px; border-radius: 14px;
  backdrop-filter: blur(6px);
  font-variant-numeric: tabular-nums;
}
#best {
  font-size: 13px;
  background: rgba(0,0,0,0.35);
  padding: 6px 12px; border-radius: 10px;
  backdrop-filter: blur(6px);
}
#combo {
  font-size: 14px;
  background: linear-gradient(135deg, #ff006e, #ff6b35);
  padding: 6px 12px; border-radius: 10px;
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  transform: translateY(-6px);
  box-shadow: 0 6px 20px rgba(255,0,110,0.4);
}
#combo.on { opacity: 1; transform: translateY(0); }

.overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; z-index: 10;
  padding: 20px;
  background: rgba(15,23,42,0.55);
  backdrop-filter: blur(8px);
  animation: fadeIn 0.3s ease;
}
.overlay.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

img.logo-img {
  display: block;
  width: 130px; height: 130px;
  filter: drop-shadow(0 8px 20px rgba(58,134,255,0.5));
  animation: bob 2.4s ease-in-out infinite;
  margin: 0 auto 6px;
  user-select: none; -webkit-user-drag: none;
}
img.logo-img.defeated {
  animation: none;
  transform: rotate(15deg);
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4)) grayscale(0.35) brightness(0.85);
  opacity: 0.75;
}
@keyframes bob {
  0%,100% { transform: translateY(0) rotate(-4deg); }
  50% { transform: translateY(-12px) rotate(4deg); }
}

h1 {
  font-size: clamp(40px, 9vw, 68px);
  font-weight: 900;
  letter-spacing: -1.5px;
  background: linear-gradient(135deg, #3a86ff, #8338ec, #ff006e);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 4px 20px rgba(0,0,0,0.4);
  margin-bottom: 8px;
}
.tagline { color: rgba(255,255,255,0.85); font-size: 15px; margin-bottom: 28px; }

.big-btn {
  background: linear-gradient(135deg, #3a86ff, #8338ec);
  color: white;
  padding: 16px 36px; border: none; border-radius: 16px;
  font: inherit; font-weight: 900; font-size: 18px;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(58,134,255,0.45);
  transition: transform 0.15s, box-shadow 0.15s;
}
.big-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(58,134,255,0.6); }
.big-btn:active { transform: translateY(0) scale(0.97); }

.controls-hint {
  margin-top: 24px; font-size: 13px;
  color: rgba(255,255,255,0.65); line-height: 1.8;
}
.controls-hint kbd {
  background: rgba(255,255,255,0.12);
  padding: 2px 8px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.2);
  font-family: ui-monospace, Menlo, monospace;
  font-size: 11px;
}

.result {
  font-size: 22px; font-weight: 800;
  margin: 4px 0;
  color: rgba(255,255,255,0.95);
}
.result span { color: #8ec5ff; }
.new-best {
  display: inline-block;
  background: linear-gradient(135deg, #fbbf24, #ff006e);
  color: white;
  padding: 4px 12px; border-radius: 10px;
  font-size: 13px; font-weight: 800;
  letter-spacing: 1px;
  margin-top: 8px;
  text-transform: uppercase;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
h2 { font-size: 42px; font-weight: 900; margin-bottom: 14px; letter-spacing: -1px; }

#perfect-flash {
  position: absolute;
  left: 50%; top: 40%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 48px; font-weight: 900;
  color: #fbbf24;
  text-shadow: 0 4px 16px rgba(0,0,0,0.6), 0 0 30px #fbbf24;
  letter-spacing: 4px;
  pointer-events: none;
  z-index: 8;
  opacity: 0;
  text-transform: uppercase;
  font-style: italic;
}
#perfect-flash.pop { animation: perfectPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes perfectPop {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0) rotate(-10deg); }
  30% { opacity: 1; transform: translate(-50%, -50%) scale(1.15) rotate(3deg); }
  70% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-1deg); }
  100% { opacity: 0; transform: translate(-50%, -60%) scale(0.95) rotate(0); }
}

.touch-hint {
  position: absolute; bottom: 20px; left: 0; right: 0;
  text-align: center; font-size: 12px;
  color: rgba(255,255,255,0.5);
  pointer-events: none;
  z-index: 5;
}
</style>
<script src="../_shared/lido-rewards.js"></script>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div id="score-wrap">
    <div id="score">0</div>
    <div id="best">Best: 0</div>
  </div>
  <div id="combo">🔥 Perfect ×1</div>
</div>
<div id="perfect-flash">PERFECT!</div>

<div id="menu" class="overlay">
  <img class="logo-img" src="lidude.svg" alt="Lidude" />
  <h1>Lidude Stack</h1>
  <div class="tagline">Time your taps. Build to the sky.</div>
  <button class="big-btn" id="start-btn">Tap to Start</button>
  <div class="controls-hint">
    Tap <kbd>anywhere</kbd> or press <kbd>Space</kbd> to drop<br>
    Hit perfect 5 in a row to reset the block width!
  </div>
</div>
<div id="over" class="overlay hidden">
  <img class="logo-img defeated" src="lidude.svg" alt="Lidude (defeated)" />
  <h2>Tower down!</h2>
  <div class="result">Floors: <span id="final-score">0</span></div>
  <div class="result" style="font-size: 16px; opacity: 0.8;">Best: <span id="final-best">0</span></div>
  <div id="new-best-badge" class="new-best" style="display:none;">🏆 New Best!</div>
  <button class="big-btn" id="retry-btn" style="margin-top: 24px;">Try Again</button>
</div>
<div class="touch-hint" id="touch-hint">Tap anywhere to drop the block</div>

<script>
// ================================================================
// SETUP
// ================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const menuEl = document.getElementById('menu');
const overEl = document.getElementById('over');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const comboEl = document.getElementById('combo');
const finalScoreEl = document.getElementById('final-score');
const finalBestEl = document.getElementById('final-best');
const newBestBadge = document.getElementById('new-best-badge');
const touchHint = document.getElementById('touch-hint');
const perfectFlash = document.getElementById('perfect-flash');

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ================================================================
// CONSTANTS
// ================================================================
const BLOCK_H = 32;
const BASE_WIDTH = Math.min(260, W * 0.6);
const SLIDE_SPEED_START = 3.2;
const SLIDE_SPEED_INC = 0.11;
const SLIDE_SPEED_MAX = 8.5;
const PERFECT_TOL = 4;
const COMBO_FOR_RESET = 5;
const CAMERA_LERP = 0.08;
const SAVE_KEY = 'lidudeStack.best';

// Lidude SVG (fallback/inline)
const LIDUDE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240"><defs><linearGradient id="lr" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff006e"/><stop offset="33%" stop-color="#ffbe0b"/><stop offset="66%" stop-color="#3a86ff"/><stop offset="100%" stop-color="#8338ec"/></linearGradient></defs><line x1="92" y1="178" x2="78" y2="220" stroke="#a8b5e0" stroke-width="9" stroke-linecap="round"/><line x1="148" y1="178" x2="162" y2="220" stroke="#a8b5e0" stroke-width="9" stroke-linecap="round"/><ellipse cx="74" cy="223" rx="17" ry="7" fill="white" stroke="#1a1a2e" stroke-width="3.5"/><ellipse cx="166" cy="223" rx="17" ry="7" fill="white" stroke="#1a1a2e" stroke-width="3.5"/><path d="M 48 110 Q 22 130 30 168 Q 35 184 50 182" fill="none" stroke="#1a1a2e" stroke-width="4.5" stroke-linecap="round"/><ellipse cx="44" cy="184" rx="13" ry="11" fill="white" stroke="#1a1a2e" stroke-width="3.5"/><path d="M 192 95 Q 212 75 205 48" fill="none" stroke="#1a1a2e" stroke-width="4.5" stroke-linecap="round"/><ellipse cx="202" cy="42" rx="11" ry="13" fill="white" stroke="#1a1a2e" stroke-width="3.5"/><rect x="40" y="60" width="160" height="120" rx="8" fill="#3aac3e" stroke="#1a1a2e" stroke-width="4.5"/><rect x="44" y="64" width="42" height="42" fill="#1a1a2e"/><rect x="158" y="148" width="28" height="28" fill="url(#lr)" stroke="#1a1a2e" stroke-width="2.5"/><line x1="50" y1="78" x2="68" y2="78" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/><line x1="48" y1="90" x2="62" y2="90" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/><circle cx="103" cy="118" r="24" fill="white" stroke="#1a1a2e" stroke-width="4"/><circle cx="148" cy="118" r="24" fill="white" stroke="#1a1a2e" stroke-width="4"/><circle cx="108" cy="121" r="11" fill="#5a8fd6"/><circle cx="153" cy="121" r="11" fill="#5a8fd6"/><circle cx="109" cy="122" r="5" fill="#1a1a2e"/><circle cx="154" cy="122" r="5" fill="#1a1a2e"/><circle cx="106" cy="118" r="2.8" fill="white"/><circle cx="151" cy="118" r="2.8" fill="white"/><ellipse cx="125" cy="158" rx="6" ry="8" fill="#1a1a2e"/><ellipse cx="125" cy="159" rx="3" ry="4" fill="#fdba74"/></svg>`;
const lidudeImg = new Image();
let lidudeReady = false;
let lidudeTriedFallback = false;
lidudeImg.onload = () => { lidudeReady = true; };
lidudeImg.onerror = () => {
  if (!lidudeTriedFallback) {
    lidudeTriedFallback = true;
    lidudeImg.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(LIDUDE_SVG);
  }
};
lidudeImg.src = 'lidude.svg';

// ================================================================
// STATE
// ================================================================
let tower = [];           // [{x, width, y, hue, light}]
let current = null;       // {x, width, y, hue, vx}
let fallingChunks = [];   // [{x, y, width, vx, vy, rot, vr, hue, alpha}]
let particles = [];
let cameraY = 0;
let cameraTarget = 0;
let score = 0;
let combo = 0;
let best = parseInt(localStorage.getItem(SAVE_KEY) || '0');
let state = 'menu';
let level = 0;
let shake = 0;
let lastTime = 0;

bestEl.textContent = `Best: ${best}`;

// ================================================================
// HELPERS
// ================================================================
function rand(a, b) { return a + Math.random() * (b - a); }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function hsl(h, s, l) { return `hsl(${h},${s}%,${l}%)`; }
function blockHue(i) { return (120 + i * 14) % 360; }

// ================================================================
// AUDIO
// ================================================================
let audioCtx = null;
function tone(freq, dur = 0.1, type = 'sine', gain = 0.12) {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return; } }
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  g.gain.setValueAtTime(gain, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + dur);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + dur);
}
function sfxClick() { tone(560, 0.06, 'triangle', 0.1); }
function sfxThud(nearFull) { tone(nearFull ? 320 : 180, 0.12, 'sine', 0.16); setTimeout(()=>tone(120, 0.1, 'sine', 0.08), 40); }
function sfxPerfect() {
  tone(660, 0.08, 'triangle', 0.13);
  setTimeout(() => tone(880, 0.1, 'triangle', 0.14), 60);
  setTimeout(() => tone(1320, 0.18, 'triangle', 0.14), 140);
}
function sfxReset() {
  [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => tone(f, 0.12, 'triangle', 0.15), i * 70));
}
function sfxFail() {
  tone(220, 0.3, 'sawtooth', 0.14);
  setTimeout(()=>tone(140, 0.45, 'sawtooth', 0.14), 180);
}

// ================================================================
// INIT
// ================================================================
function resetGame() {
  tower = [];
  fallingChunks = [];
  particles = [];
  score = 0;
  combo = 0;
  level = 0;
  shake = 0;

  // Foundation — a tall chunky base
  const foundationW = BASE_WIDTH;
  const foundationX = (W - foundationW) / 2;
  const foundationY = H - 80; // base sits near the bottom in world coords
  tower.push({ x: foundationX, width: foundationW, y: foundationY, hue: blockHue(0), isBase: true, height: 70 });

  cameraY = 0;
  cameraTarget = 0;
  spawnNextBlock();
  updateHUD();
}

function spawnNextBlock() {
  const top = tower[tower.length - 1];
  const width = top.width;
  const y = top.y - BLOCK_H;
  const fromLeft = (tower.length % 2) === 1;
  const x = fromLeft ? -width : W;
  const speed = Math.min(SLIDE_SPEED_MAX, SLIDE_SPEED_START + level * SLIDE_SPEED_INC);
  const vx = fromLeft ? speed : -speed;
  current = { x, y, width, hue: blockHue(tower.length), vx };
}

// ================================================================
// GAMEPLAY
// ================================================================
function dropBlock() {
  if (state !== 'playing' || !current) return;
  const top = tower[tower.length - 1];
  const leftA = current.x, rightA = current.x + current.width;
  const leftB = top.x,    rightB = top.x + top.width;
  const overlapLeft = Math.max(leftA, leftB);
  const overlapRight = Math.min(rightA, rightB);
  const overlap = overlapRight - overlapLeft;

  if (overlap <= 0) {
    // Total miss — game over. Let the block fall away.
    fallingChunks.push({
      x: current.x, y: current.y, width: current.width, height: BLOCK_H,
      vx: Math.sign(current.x + current.width/2 - W/2) * 3,
      vy: -2, rot: 0, vr: rand(-0.08, 0.08),
      hue: current.hue, alpha: 1,
    });
    current = null;
    endGame();
    return;
  }

  const centerA = current.x + current.width / 2;
  const centerB = top.x + top.width / 2;
  const perfect = Math.abs(centerA - centerB) <= PERFECT_TOL;

  if (perfect) {
    combo++;
    score++;
    level++;
    // Align it perfectly
    tower.push({ x: top.x, width: top.width, y: current.y, hue: current.hue });
    burstParticles(top.x + top.width/2, current.y, current.hue, 16);
    flashPerfect();
    sfxPerfect();
    // Every COMBO_FOR_RESET perfects, restore full width
    if (combo >= COMBO_FOR_RESET && top.width < BASE_WIDTH) {
      combo = 0;
      const newWidth = Math.min(BASE_WIDTH, top.width + 30);
      // Replace the just-added block with the wider one, re-centered
      const last = tower[tower.length - 1];
      last.width = newWidth;
      last.x = (W - newWidth) / 2;
      // Sound + flash
      sfxReset();
      burstParticles(W/2, current.y, 50, 30);
    }
  } else {
    // Trim: place only the overlapping segment
    tower.push({ x: overlapLeft, width: overlap, y: current.y, hue: current.hue });
    score++;
    level++;
    combo = 0;
    // Spawn falling chunk from the overhang
    if (leftA < leftB) {
      // overhang on the left
      const cw = leftB - leftA;
      fallingChunks.push({
        x: leftA, y: current.y, width: cw, height: BLOCK_H,
        vx: -2, vy: 0, rot: 0, vr: rand(-0.1, -0.02),
        hue: current.hue, alpha: 1,
      });
    } else if (rightA > rightB) {
      const cw = rightA - rightB;
      fallingChunks.push({
        x: rightB, y: current.y, width: cw, height: BLOCK_H,
        vx: 2, vy: 0, rot: 0, vr: rand(0.02, 0.1),
        hue: current.hue, alpha: 1,
      });
    }
    const nearFull = overlap > top.width - 12;
    sfxThud(nearFull);
  }

  // Camera target rises to keep the tower visible (in world coords the y decreases)
  cameraTarget = Math.max(0, tower[tower.length - 1].y - H * 0.45);

  // Slight shake on imperfect
  if (!perfect) shake = 4;

  // Next
  current = null;
  updateHUD();
  if (state === 'playing') spawnNextBlock();
}

function updateHUD() {
  scoreEl.textContent = score;
  if (combo >= 2) {
    comboEl.textContent = `🔥 Perfect ×${combo}`;
    comboEl.classList.add('on');
  } else {
    comboEl.classList.remove('on');
  }
}

function flashPerfect() {
  perfectFlash.classList.remove('pop');
  void perfectFlash.offsetWidth;
  perfectFlash.classList.add('pop');
}

function burstParticles(x, y, hue, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = rand(2, 6);
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 2,
      life: 1,
      size: rand(3, 6),
      hue,
    });
  }
}

// ================================================================
// UPDATE
// ================================================================
function update(dt) {
  // Camera lerp (always updates so menu parallax is smooth too)
  const diff = cameraTarget - cameraY;
  cameraY += diff * CAMERA_LERP;

  // Slide current block
  if (state === 'playing' && current) {
    current.x += current.vx;
    if (current.vx < 0 && current.x < 20) { current.x = 20; current.vx *= -1; }
    if (current.vx > 0 && current.x + current.width > W - 20) { current.x = W - 20 - current.width; current.vx *= -1; }
  }

  // Falling chunks
  for (const c of fallingChunks) {
    c.vy += 0.55;
    c.x += c.vx;
    c.y += c.vy;
    c.rot += c.vr;
    c.alpha -= 0.008;
  }
  fallingChunks = fallingChunks.filter(c => c.alpha > 0 && c.y - cameraY < H + 400);

  // Particles
  for (const p of particles) {
    p.vy += 0.25;
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.025;
  }
  particles = particles.filter(p => p.life > 0);

  // Screen shake decay
  shake *= 0.88;
}

// ================================================================
// RENDER
// ================================================================
function drawBackground() {
  // Altitude-based gradient — starts teal, rotates through space blues/purples
  const alt = clamp(level / 60, 0, 1);
  const topHue = (200 + alt * 90) % 360;    // 200 -> 290
  const botHue = (220 + alt * 70) % 360;
  const topL = lerp(25, 8, alt);
  const botL = lerp(50, 18, alt);
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, hsl(topHue, 55, topL));
  g.addColorStop(1, hsl(botHue, 70, botL));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Stars fade in with altitude
  if (alt > 0.2) {
    ctx.fillStyle = `rgba(255,255,255,${(alt-0.2)*1.3})`;
    const seed = Math.floor(cameraY / 2);
    for (let i = 0; i < 50; i++) {
      const x = ((i * 127 + seed * 0.3) % W + W) % W;
      const y = ((i * 83 + seed * 0.6) % H + H) % H;
      const sz = (i % 4 === 0) ? 2.5 : 1.3;
      ctx.fillRect(x, y, sz, sz);
    }
  }
  // Horizon band
  ctx.fillStyle = `rgba(255,255,255,${0.08 * (1 - alt)})`;
  ctx.fillRect(0, H * 0.7, W, H * 0.01);
}

function drawBlock(b, withOutline = true) {
  const y = b.y - cameraY;
  const h = b.height || BLOCK_H;
  if (y + h < -40 || y > H + 40) return;
  // Main face
  const baseL = 52;
  const g = ctx.createLinearGradient(0, y, 0, y + h);
  g.addColorStop(0, hsl(b.hue, 70, baseL + 8));
  g.addColorStop(1, hsl(b.hue, 70, baseL - 14));
  roundRect(b.x, y, b.width, h, 6);
  ctx.fillStyle = g;
  ctx.fill();
  // Highlight strip
  ctx.fillStyle = hsl(b.hue, 75, baseL + 18);
  roundRect(b.x + 4, y + 3, b.width - 8, 4, 2);
  ctx.fill();
  // Outline
  if (withOutline) {
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 2;
    roundRect(b.x, y, b.width, h, 6);
    ctx.stroke();
  }
}

function drawFallingChunk(c) {
  ctx.save();
  const yScreen = c.y - cameraY;
  ctx.globalAlpha = Math.max(0, c.alpha);
  ctx.translate(c.x + c.width/2, yScreen + c.height/2);
  ctx.rotate(c.rot);
  const g = ctx.createLinearGradient(0, -c.height/2, 0, c.height/2);
  g.addColorStop(0, hsl(c.hue, 70, 60));
  g.addColorStop(1, hsl(c.hue, 70, 38));
  roundRect(-c.width/2, -c.height/2, c.width, c.height, 5);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = hsl(p.hue, 80, 65);
    ctx.beginPath();
    ctx.arc(p.x, p.y - cameraY, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawLidudeOnTop() {
  // Draw Lidude sitting on top of the highest tower block (follows camera)
  if (!lidudeReady || tower.length === 0) return;
  const top = tower[tower.length - 1];
  const size = Math.min(48, top.width * 0.6);
  if (size < 24) return;  // too narrow to stand on
  const cx = top.x + top.width / 2;
  const cy = top.y - cameraY - size/2 - 2;
  ctx.save();
  // subtle bob with time for life
  const bob = Math.sin(performance.now() * 0.003) * 2;
  ctx.translate(cx, cy + bob);
  // Face the direction the next block slides from
  if (current && current.vx < 0) ctx.scale(-1, 1);
  // small shadow under
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, size/2 + 3, size/3, 3, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.drawImage(lidudeImg, -size/2, -size/2, size, size);
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function render() {
  // shake
  const sx = (Math.random() - 0.5) * shake;
  const sy = (Math.random() - 0.5) * shake;
  ctx.save();
  ctx.translate(sx, sy);

  drawBackground();

  // Tower (from bottom up) — apply camera
  for (const b of tower) drawBlock(b);
  // Current sliding block
  if (current) drawBlock(current);
  // Lidude on top of tower
  drawLidudeOnTop();
  // Falling chunks (on top)
  for (const c of fallingChunks) drawFallingChunk(c);
  // Particles
  drawParticles();

  ctx.restore();
}

// ================================================================
// LOOP
// ================================================================
function loop(t) {
  const dt = Math.min(32, t - lastTime);
  lastTime = t;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ================================================================
// FLOW
// ================================================================
function startGame() {
  resetGame();
  state = 'playing';
  menuEl.classList.add('hidden');
  overEl.classList.add('hidden');
  touchHint.style.display = 'none';
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
}

function endGame() {
  state = 'over';
  sfxFail();
  shake = 10;
  // Camera eases back to show the tower
  if (tower.length > 6) {
    cameraTarget = Math.max(0, tower[tower.length - 1].y - H * 0.55);
  }
  finalScoreEl.textContent = score;
  newBestBadge.style.display = 'none';
  if (score > best) {
    best = score;
    localStorage.setItem(SAVE_KEY, best);
    bestEl.textContent = `Best: ${best}`;
    newBestBadge.style.display = 'inline-block';
  }
  finalBestEl.textContent = best;
  setTimeout(() => overEl.classList.remove('hidden'), 900);
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);

// ================================================================
// INPUT
// ================================================================
function handleInput() {
  if (state === 'playing') { sfxClick(); dropBlock(); }
}

window.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowDown') {
    e.preventDefault();
    if (state === 'menu' || state === 'over') startGame();
    else handleInput();
  }
});

// Tap anywhere (but not on overlay buttons)
canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  handleInput();
}, { passive: false });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });

// ================================================================
// DEMO TOWER (shows on menu)
// ================================================================
(function seedDemo() {
  // Seed a small visual tower behind the menu so it's not empty
  tower = [];
  const base = BASE_WIDTH;
  const cx = W / 2;
  const startY = H - 80;
  tower.push({ x: (W - base) / 2, width: base, y: startY, hue: blockHue(0), height: 70 });
  for (let i = 1; i < 8; i++) {
    const w = base * (1 - i * 0.04);
    tower.push({ x: cx - w/2, width: w, y: startY - i * BLOCK_H, hue: blockHue(i) });
  }
  cameraY = tower[tower.length-1].y - H * 0.55;
  cameraTarget = cameraY;
})();

</script>
