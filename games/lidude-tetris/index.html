<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Lidude Tetris</title>
<style>
  :root {
    --brand:        #2B2A6B;
    --brand-light:  #4A49A3;
    --brand-accent: #FFC233;
    --danger:       #D64545;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: #0E0E22;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #fff;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
    user-select: none;
    background: radial-gradient(ellipse at top, #1d1c4a 0%, #0E0E22 60%);
  }

  .shell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 620px;
  }

  .title {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 900;
    letter-spacing: -1px;
    color: #fff;
    text-shadow: 3px 3px 0 var(--brand-accent);
    margin: 0;
    text-align: center;
    line-height: 1;
  }
  .title .accent { color: var(--danger); }

  .layout {
    display: grid;
    grid-template-columns: auto 150px;
    gap: 14px;
    align-items: start;
  }

  .stage {
    position: relative;
    width: clamp(260px, 70vw, 360px);
    aspect-ratio: 1 / 2;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 4px var(--brand),
      0 0 0 8px var(--brand-accent),
      0 14px 0 rgba(0,0,0,0.35);
  }

  canvas { display: block; width: 100%; height: 100%; }

  .side {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 140px;
  }
  .panel {
    background: var(--brand);
    color: #fff;
    padding: 10px 12px;
    border-radius: 10px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.35);
  }
  .panel .label {
    font-size: 10px; opacity: 0.7;
    text-transform: uppercase; letter-spacing: 1.2px; font-weight: 800;
  }
  .panel .value {
    font-size: 22px; font-weight: 900; color: var(--brand-accent); font-variant-numeric: tabular-nums; line-height: 1.1;
  }
  .panel.next canvas { width: 100%; aspect-ratio: 1; display: block; background: rgba(0,0,0,0.25); border-radius: 6px; margin-top: 6px; }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: rgba(14, 14, 34, 0.85);
    color: #fff;
    padding: 20px;
    gap: 10px;
    transition: opacity 180ms ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay h2 {
    font-size: clamp(22px, 5vw, 32px);
    margin: 0;
    text-shadow: 3px 3px 0 var(--brand-accent);
  }
  .overlay p { margin: 0; font-weight: 600; opacity: 0.9; }

  .btn {
    margin-top: 8px;
    background: var(--brand-accent);
    color: var(--brand);
    border: none;
    padding: 11px 20px;
    font-size: 16px;
    font-weight: 900;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.35);
    transition: transform 80ms ease, box-shadow 80ms ease;
    font-family: inherit;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.35); }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.35); }

  .hint {
    font-size: 11px; opacity: 0.6; color: #fff; font-weight: 600; text-align: center;
    line-height: 1.8;
  }
  .key {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    border-radius: 4px;
    padding: 1px 5px;
    font-weight: 800;
    font-size: 10px;
    margin: 0 2px;
  }
  .footer {
    font-size: 12px;
    color: #fff;
    opacity: 0.55;
    margin-top: 4px;
    font-weight: 600;
  }

  @media (max-width: 560px) {
    .layout { grid-template-columns: auto 112px; gap: 10px; }
    .side { min-width: 0; }
    .panel { padding: 8px 10px; }
    .panel .value { font-size: 18px; }
  }
</style>
<script src="../_shared/lido-rewards.js"></script>
</head>
<body>
  <div class="shell">
    <h1 class="title">Lidude <span class="accent">Tetris</span></h1>

    <div class="layout">
      <div class="stage">
        <canvas id="game"></canvas>
        <div class="overlay" id="overlay">
          <h2 id="overlay-title">Lidude Tetris</h2>
          <p id="overlay-sub">Stack L-coins. Clear lines. Chase the high score.</p>
          <button class="btn" id="start-btn">Start</button>
        </div>
      </div>

      <div class="side">
        <div class="panel">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="panel">
          <div class="label">Lines</div>
          <div class="value" id="lines">0</div>
        </div>
        <div class="panel">
          <div class="label">Level</div>
          <div class="value" id="level">1</div>
        </div>
        <div class="panel">
          <div class="label">Best</div>
          <div class="value" id="best">0</div>
        </div>
        <div class="panel next">
          <div class="label">Next</div>
          <canvas id="next"></canvas>
        </div>
      </div>
    </div>

    <div class="hint">
      <span class="key">&larr;</span><span class="key">&rarr;</span> move &middot;
      <span class="key">&darr;</span> soft drop &middot;
      <span class="key">&uarr;</span>/<span class="key">X</span> rotate &middot;
      <span class="key">Space</span> hard drop &middot;
      <span class="key">P</span> pause
    </div>
    <div class="footer">A Lido joint &middot; 7-bag randomizer</div>
  </div>

<script>
(() => {
  'use strict';

  // ---------- Config ----------
  const COLS = 10;
  const ROWS = 20;
  const CELL = 28; // logical
  const BOARD_W = COLS * CELL;
  const BOARD_H = ROWS * CELL;

  const STORAGE_KEY = 'lidude-tetris:best';

  // Lines per level
  const LINES_PER_LEVEL = 10;

  // Drop intervals in ms (indexed by level, capped)
  function dropInterval(level) {
    // Classic approximation
    const table = [800, 720, 630, 550, 470, 380, 300, 220, 160, 110, 80, 60, 50, 40, 30];
    return table[Math.min(table.length - 1, level - 1)];
  }

  // ---------- Pieces (SRS-ish) ----------
  // Each piece defined at its 4 rotation states, as list of [r,c] cells
  const PIECES = {
    I: {
      color: '#4DD8FF',
      rotations: [
        [[1,0],[1,1],[1,2],[1,3]],
        [[0,2],[1,2],[2,2],[3,2]],
        [[2,0],[2,1],[2,2],[2,3]],
        [[0,1],[1,1],[2,1],[3,1]],
      ],
      size: 4,
    },
    O: {
      color: '#FFC233',
      rotations: [
        [[0,1],[0,2],[1,1],[1,2]],
        [[0,1],[0,2],[1,1],[1,2]],
        [[0,1],[0,2],[1,1],[1,2]],
        [[0,1],[0,2],[1,1],[1,2]],
      ],
      size: 4,
    },
    T: {
      color: '#B47AFF',
      rotations: [
        [[0,1],[1,0],[1,1],[1,2]],
        [[0,1],[1,1],[1,2],[2,1]],
        [[1,0],[1,1],[1,2],[2,1]],
        [[0,1],[1,0],[1,1],[2,1]],
      ],
      size: 3,
    },
    S: {
      color: '#5BD66B',
      rotations: [
        [[0,1],[0,2],[1,0],[1,1]],
        [[0,1],[1,1],[1,2],[2,2]],
        [[1,1],[1,2],[2,0],[2,1]],
        [[0,0],[1,0],[1,1],[2,1]],
      ],
      size: 3,
    },
    Z: {
      color: '#FF6A3D',
      rotations: [
        [[0,0],[0,1],[1,1],[1,2]],
        [[0,2],[1,1],[1,2],[2,1]],
        [[1,0],[1,1],[2,1],[2,2]],
        [[0,1],[1,0],[1,1],[2,0]],
      ],
      size: 3,
    },
    J: {
      color: '#4A49A3',
      rotations: [
        [[0,0],[1,0],[1,1],[1,2]],
        [[0,1],[0,2],[1,1],[2,1]],
        [[1,0],[1,1],[1,2],[2,2]],
        [[0,1],[1,1],[2,0],[2,1]],
      ],
      size: 3,
    },
    L: {
      color: '#FF8F52',
      rotations: [
        [[0,2],[1,0],[1,1],[1,2]],
        [[0,1],[1,1],[2,1],[2,2]],
        [[1,0],[1,1],[1,2],[2,0]],
        [[0,0],[0,1],[1,1],[2,1]],
      ],
      size: 3,
    },
  };
  const PIECE_KEYS = Object.keys(PIECES);

  // ---------- Canvas ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const nextCanvas = document.getElementById('next');
  const nctx = nextCanvas.getContext('2d');

  function fitCanvas() {
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width  = BOARD_W * dpr;
    canvas.height = BOARD_H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Next canvas sized based on actual layout width
    const r = nextCanvas.getBoundingClientRect();
    const dim = Math.max(80, Math.floor(r.width));
    nextCanvas.width  = dim * dpr;
    nextCanvas.height = dim * dpr;
    nctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    nextCanvas._dim = dim;
  }
  fitCanvas();
  window.addEventListener('resize', fitCanvas);

  // ---------- State ----------
  const state = {
    grid: emptyGrid(),
    score: 0,
    lines: 0,
    level: 1,
    best: loadBest(),
    bag: [],
    current: null,     // { key, r, c, rot }
    next: null,
    fallAcc: 0,
    lastTick: 0,
    running: false,
    over: false,
    paused: false,
    started: false,
    clearFlash: 0,
  };

  const els = {
    score: document.getElementById('score'),
    lines: document.getElementById('lines'),
    level: document.getElementById('level'),
    best:  document.getElementById('best'),
    overlay: document.getElementById('overlay'),
    overlayTitle: document.getElementById('overlay-title'),
    overlaySub:   document.getElementById('overlay-sub'),
    startBtn: document.getElementById('start-btn'),
  };
  els.best.textContent = state.best;

  function emptyGrid() {
    return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  }

  // ---------- Persistence ----------
  function loadBest() {
    try {
      const v = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
      return Number.isFinite(v) && v >= 0 ? v : 0;
    } catch (_) { return 0; }
  }
  function saveBest() {
    try { localStorage.setItem(STORAGE_KEY, String(state.best)); } catch (_) {}
  }

  // ---------- Bag ----------
  function refillBag() {
    const b = [...PIECE_KEYS];
    for (let i = b.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [b[i], b[j]] = [b[j], b[i]];
    }
    state.bag.push(...b);
  }
  function drawFromBag() {
    if (state.bag.length === 0) refillBag();
    return state.bag.shift();
  }

  // ---------- Piece helpers ----------
  function spawnPiece(key) {
    const piece = PIECES[key];
    const p = { key, rot: 0, r: 0, c: Math.floor((COLS - piece.size) / 2) };
    // I piece spawns slightly higher
    if (key === 'I') p.r = -1;
    return p;
  }

  function pieceCells(p) {
    return PIECES[p.key].rotations[p.rot].map(([r, c]) => [p.r + r, p.c + c]);
  }

  function collides(p) {
    for (const [r, c] of pieceCells(p)) {
      if (c < 0 || c >= COLS || r >= ROWS) return true;
      if (r >= 0 && state.grid[r][c]) return true;
    }
    return false;
  }

  function lockPiece() {
    for (const [r, c] of pieceCells(state.current)) {
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
        state.grid[r][c] = state.current.key;
      }
    }
    // Line clears
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (state.grid[r].every(cell => cell)) {
        state.grid.splice(r, 1);
        state.grid.unshift(Array(COLS).fill(null));
        cleared++;
        r++; // recheck this row (which now holds the row above)
      }
    }
    if (cleared > 0) {
      const base = [0, 100, 300, 500, 800][cleared];
      state.score += base * state.level;
      state.lines += cleared;
      state.clearFlash = 1;
      const newLevel = Math.floor(state.lines / LINES_PER_LEVEL) + 1;
      if (newLevel > state.level) state.level = newLevel;
      if (state.score > state.best) { state.best = state.score; saveBest(); }
      updateHUD();
    }
    // Next piece
    state.current = spawnPiece(state.next);
    state.next    = drawFromBag();
    drawNext();
    // Game over check
    if (collides(state.current)) {
      gameOver();
    }
  }

  function hardDrop() {
    let fell = 0;
    while (true) {
      state.current.r++;
      if (collides(state.current)) {
        state.current.r--;
        break;
      }
      fell++;
    }
    state.score += fell * 2; // hard drop bonus
    updateHUD();
    lockPiece();
  }

  function softDrop() {
    state.current.r++;
    if (collides(state.current)) {
      state.current.r--;
      lockPiece();
    } else {
      state.score += 1; // soft drop bonus
      updateHUD();
    }
  }

  function tryMove(dr, dc) {
    state.current.r += dr;
    state.current.c += dc;
    if (collides(state.current)) {
      state.current.r -= dr;
      state.current.c -= dc;
      return false;
    }
    return true;
  }

  function tryRotate(dir) {
    const prevRot = state.current.rot;
    state.current.rot = (state.current.rot + dir + 4) % 4;
    // Basic wall kicks: try shifts left/right/up
    const kicks = [[0,0],[0,-1],[0,1],[0,-2],[0,2],[-1,0]];
    for (const [dr, dc] of kicks) {
      state.current.r += dr;
      state.current.c += dc;
      if (!collides(state.current)) return true;
      state.current.r -= dr;
      state.current.c -= dc;
    }
    state.current.rot = prevRot;
    return false;
  }

  // ---------- Lifecycle ----------
  function startGame() {
    state.grid = emptyGrid();
    state.score = 0;
    state.lines = 0;
    state.level = 1;
    state.bag = [];
    state.current = spawnPiece(drawFromBag());
    state.next    = drawFromBag();
    state.over = false;
    state.paused = false;
    state.started = true;
    state.running = true;
    state.fallAcc = 0;
    state.lastTick = performance.now();
    updateHUD();
    drawNext();
    hideOverlay();
  }

  function gameOver() {
    state.over = true;
    state.running = false;
    if (state.score > state.best) { state.best = state.score; saveBest(); }
    updateHUD();
    showOverlay({
      title: 'Game Over',
      sub: `Final score: <b>${state.score}</b> · Lines: <b>${state.lines}</b> · Best: <b>${state.best}</b>.`,
      btn: 'Play Again',
    });
  }

  function togglePause() {
    if (!state.started || state.over) return;
    state.paused = !state.paused;
    if (state.paused) {
      state.running = false;
      showOverlay({ title: 'Paused', sub: 'Take a breather.', btn: 'Resume' });
    } else {
      state.running = true;
      state.lastTick = performance.now();
      hideOverlay();
    }
  }

  // ---------- Loop ----------
  function tick(now) {
    if (state.running) {
      const dt = now - state.lastTick;
      state.lastTick = now;
      state.fallAcc += dt;
      const iv = dropInterval(state.level);
      while (state.fallAcc >= iv) {
        state.fallAcc -= iv;
        softDrop();
        if (state.over) break;
      }
    } else {
      state.lastTick = now;
    }
    draw();
    requestAnimationFrame(tick);
  }

  // ---------- Draw ----------
  function draw() {
    // Background
    const grd = ctx.createLinearGradient(0, 0, 0, BOARD_H);
    grd.addColorStop(0, '#1d1c4a');
    grd.addColorStop(1, '#0E0E22');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, BOARD_W, BOARD_H);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let i = 1; i < COLS; i++) { ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, BOARD_H); ctx.stroke(); }
    for (let i = 1; i < ROWS; i++) { ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(BOARD_W, i * CELL); ctx.stroke(); }

    // Locked cells
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const k = state.grid[r][c];
        if (k) drawCell(c * CELL, r * CELL, PIECES[k].color);
      }
    }

    // Ghost piece
    if (state.current) {
      const ghost = { ...state.current };
      while (true) {
        ghost.r++;
        if (collides(ghost)) { ghost.r--; break; }
      }
      for (const [r, c] of pieceCells(ghost)) {
        if (r >= 0) drawCell(c * CELL, r * CELL, PIECES[ghost.key].color, true);
      }
    }

    // Current piece
    if (state.current) {
      for (const [r, c] of pieceCells(state.current)) {
        if (r >= 0) drawCell(c * CELL, r * CELL, PIECES[state.current.key].color);
      }
    }

    // Line-clear flash
    if (state.clearFlash > 0) {
      ctx.fillStyle = `rgba(255,194,51,${state.clearFlash * 0.25})`;
      ctx.fillRect(0, 0, BOARD_W, BOARD_H);
      state.clearFlash = Math.max(0, state.clearFlash - 0.08);
    }
  }

  function drawCell(x, y, color, ghost = false) {
    const pad = 1;
    const w = CELL - pad * 2;
    const h = CELL - pad * 2;
    if (ghost) {
      ctx.strokeStyle = color;
      ctx.globalAlpha = 0.35;
      ctx.lineWidth = 2;
      ctx.strokeRect(x + pad + 1, y + pad + 1, w - 2, h - 2);
      ctx.globalAlpha = 1;
      return;
    }
    // Body
    ctx.fillStyle = color;
    ctx.fillRect(x + pad, y + pad, w, h);
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(x + pad, y + pad, w, 2);
    ctx.fillRect(x + pad, y + pad, 2, h);
    // Shadow lip
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x + pad, y + pad + h - 3, w, 3);
    ctx.fillRect(x + pad + w - 3, y + pad, 3, h);
    // "L" mark
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.font = 'bold 13px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('L', x + CELL/2, y + CELL/2 + 1);
  }

  function drawNext() {
    const dim = nextCanvas._dim || 120;
    nctx.fillStyle = 'rgba(0,0,0,0.0)';
    nctx.clearRect(0, 0, dim, dim);
    if (!state.next) return;
    const piece = PIECES[state.next];
    const size = piece.size;
    const cells = piece.rotations[0];
    const cell = Math.floor(dim / (size + 1));
    const offX = Math.floor((dim - size * cell) / 2);
    const offY = Math.floor((dim - size * cell) / 2);
    for (const [r, c] of cells) {
      const x = offX + c * cell;
      const y = offY + r * cell;
      nctx.fillStyle = piece.color;
      nctx.fillRect(x + 1, y + 1, cell - 2, cell - 2);
      nctx.fillStyle = 'rgba(255,255,255,0.2)';
      nctx.fillRect(x + 1, y + 1, cell - 2, 2);
      nctx.fillStyle = 'rgba(0,0,0,0.25)';
      nctx.fillRect(x + 1, y + cell - 3, cell - 2, 2);
    }
  }

  // ---------- HUD + Overlay ----------
  function updateHUD() {
    els.score.textContent = state.score;
    els.lines.textContent = state.lines;
    els.level.textContent = state.level;
    els.best.textContent  = state.best;
  }
  function showOverlay({ title, sub, btn }) {
    els.overlayTitle.textContent = title;
    els.overlaySub.innerHTML = sub;
    els.startBtn.textContent = btn;
    els.overlay.classList.remove('hidden');
  }
  function hideOverlay() { els.overlay.classList.add('hidden'); }

  // ---------- Input ----------
  window.addEventListener('keydown', (e) => {
    const k = e.key;
    if (k === ' ' || k === 'ArrowUp' || k === 'ArrowDown' || k === 'ArrowLeft' || k === 'ArrowRight') e.preventDefault();
    if (!state.started || state.over) {
      if (k === 'Enter' || k === ' ') startGame();
      return;
    }
    if (state.paused) {
      if (k === 'p' || k === 'P' || k === 'Escape') togglePause();
      return;
    }
    if (k === 'ArrowLeft'  || k === 'a' || k === 'A') tryMove(0, -1);
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') tryMove(0, 1);
    else if (k === 'ArrowDown'  || k === 's' || k === 'S') softDrop();
    else if (k === 'ArrowUp'    || k === 'x' || k === 'X') tryRotate(1);
    else if (k === 'z' || k === 'Z') tryRotate(-1);
    else if (k === ' ') hardDrop();
    else if (k === 'p' || k === 'P' || k === 'Escape') togglePause();
  }, { passive: false });

  els.startBtn.addEventListener('click', () => {
    if (state.paused && !state.over) togglePause();
    else startGame();
  });

  // ---------- Kick off ----------
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
