<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Lidude Dash</title>
<style>
  :root {
    --navy: #2B2A6B;
    --navy-deep: #1E1D52;
    --navy-darker: #14143A;
    --gold: #FFC233;
    --gold-deep: #E8A91B;
    --cream: #FFF6E0;
    --red: #E63946;
    --sky-top: #B6E5FF;
    --sky-bot: #FFE8A3;
    --ground: #E0B770;
    --ground-deep: #8a5c21;
    --ink: #14143A;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    background: var(--navy-darker);
    color: var(--cream);
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .app { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 12px; }
  .shell { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 10px; }
  header.top { display: flex; align-items: center; gap: 10px; }
  .logo { display: flex; align-items: center; gap: 10px; flex: 1; }
  .mascot { width: 40px; height: 40px; border-radius: 50%; background: var(--cream); position: relative; box-shadow: 0 2px 0 rgba(0,0,0,0.25); flex-shrink: 0; }
  .mascot::before { content: ''; position: absolute; top: -4px; left: 5px; right: 5px; height: 16px; background: var(--red); border-radius: 20px 20px 6px 6px / 20px 20px 6px 6px; }
  .mascot::after { content: 'L'; position: absolute; top: -2px; left: 0; right: 0; text-align: center; color: var(--cream); font-weight: 900; font-size: 11px; line-height: 16px; z-index: 2; text-shadow: 0 1px 0 #a72531; }
  .mstache { position: absolute; left: 7px; right: 7px; bottom: 9px; height: 5px; background: #3a2a1a; border-radius: 10px 10px 4px 4px / 8px 8px 3px 3px; }
  .title { font-family: "Georgia", "Times New Roman", serif; font-weight: 900; font-size: 20px; line-height: 1; color: var(--cream); letter-spacing: 0.3px; }
  .title em { font-style: normal; color: var(--gold); }
  .subtitle { font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(255, 246, 224, 0.55); margin-top: 2px; }
  .hud { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 194, 51, 0.25); border-radius: 10px; padding: 7px 10px; text-align: center; }
  .stat .label { font-size: 9px; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(255, 246, 224, 0.55); }
  .stat .value { font-weight: 800; font-size: 17px; margin-top: 2px; color: var(--cream); font-variant-numeric: tabular-nums; }
  .stat .value.gold { color: var(--gold); }
  .board-wrap {
    position: relative;
    padding: 8px;
    background: linear-gradient(145deg, var(--gold) 0%, var(--gold-deep) 100%);
    border-radius: 18px;
    box-shadow: 0 0 0 4px var(--navy), 0 14px 40px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.35), inset 0 -2px 0 rgba(0, 0, 0, 0.15);
  }
  canvas#game {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 12px;
    background: transparent;
    touch-action: none;
  }
  .overlay {
    position: absolute;
    inset: 8px;
    background: rgba(20, 20, 58, 0.82);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    border-radius: 12px; opacity: 0; pointer-events: none;
    transition: opacity 200ms ease; text-align: center; padding: 20px;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay h2 { margin: 0; font-family: "Georgia", "Times New Roman", serif; font-size: 28px; color: var(--gold); text-shadow: 0 2px 0 rgba(0,0,0,0.4); }
  .overlay .lead { font-size: 13px; color: var(--cream); opacity: 0.88; max-width: 360px; }
  .overlay .buttons { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  button { appearance: none; border: 0; border-radius: 10px; padding: 9px 14px; font-weight: 800; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-family: inherit; transition: transform 80ms ease, filter 80ms ease; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--gold); color: var(--ink); box-shadow: 0 2px 0 var(--gold-deep), 0 4px 14px rgba(255, 194, 51, 0.25); }
  button.primary:hover { filter: brightness(1.05); }
  button.ghost { background: rgba(255, 255, 255, 0.08); color: var(--cream); border: 1px solid rgba(255, 246, 224, 0.25); }
  .controls { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .hint { font-size: 10px; letter-spacing: 0.3px; color: rgba(255, 246, 224, 0.55); flex: 1; line-height: 1.5; }
  .hint kbd { background: rgba(255, 194, 51, 0.18); color: var(--gold); border-radius: 3px; padding: 1px 5px; font-family: monospace; font-size: 10px; }
  footer.foot { text-align: center; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(255, 246, 224, 0.4); }
</style>
</head>
<body>
<div class="app">
  <div class="shell">
    <header class="top">
      <div class="logo">
        <div class="mascot"><div class="mstache"></div></div>
        <div>
          <div class="title">Lidude <em>Dash</em></div>
          <div class="subtitle">Sprint &middot; Jump &middot; Duck</div>
        </div>
      </div>
      <button class="ghost" id="newBtn">New Run</button>
    </header>

    <div class="hud">
      <div class="stat"><div class="label">Distance</div><div class="value" id="score">0m</div></div>
      <div class="stat"><div class="label">Coins</div><div class="value gold" id="coins">0</div></div>
      <div class="stat"><div class="label">Best</div><div class="value gold" id="best">0m</div></div>
    </div>

    <div class="board-wrap">
      <canvas id="game" width="680" height="260"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="ovTitle">Ready to run?</h2>
        <div class="lead" id="ovLead">Space or tap to jump. Down-arrow or swipe down to duck. Dodge market bears on the ground and stETH drones overhead. Grab gold coins.</div>
        <div class="buttons">
          <button class="primary" id="ovStart">Start</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="hint"><kbd>Space</kbd> / Tap jump &middot; <kbd>&darr;</kbd> / Swipe-down duck &middot; speed ramps as you go</div>
    </div>

    <footer class="foot">Lido &middot; Super Lidude Dash</footer>
  </div>
</div>

<script>
(function () {
  'use strict';

  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  (function hidpi() {
    var dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  })();

  var BEST_KEY = 'super-lidude-dash:best';

  var scoreEl = document.getElementById('score');
  var coinsEl = document.getElementById('coins');
  var bestEl = document.getElementById('best');
  var overlay = document.getElementById('overlay');
  var ovTitle = document.getElementById('ovTitle');
  var ovLead = document.getElementById('ovLead');
  var ovStart = document.getElementById('ovStart');
  var newBtn = document.getElementById('newBtn');

  // ---- World ----
  var GROUND_Y = H - 40;     // y of the top of the ground surface
  var GRAVITY = 0.9;
  var JUMP_VEL = -15;
  var PLAYER_X = 80;
  var PLAYER_R = 20;

  var running = false;
  var gameOver = false;
  var speed = 6;             // world scroll speed (px per frame)
  var baseSpeed = 6;
  var distance = 0;          // world px traveled
  var coins = 0;
  var best = 0;

  var ducking = false;
  var jumpHeld = false;
  var jumpedAt = 0;          // for variable jump height
  var jumpJustPressed = false;

  var obstacles = [];        // {type:'bear'|'drone', x,y,w,h,anim}
  var coinsList = [];        // {x,y,r,picked}
  var clouds = [];
  var mountains = [];

  var player = {
    x: PLAYER_X,
    y: GROUND_Y - PLAYER_R,
    vy: 0,
    onGround: true,
    anim: 0
  };

  try { best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0; } catch (e) {}
  bestEl.textContent = best + 'm';

  // ---- Input ----
  function handleJump() {
    if (!running) return;
    if (player.onGround && !ducking) {
      player.vy = JUMP_VEL;
      player.onGround = false;
      jumpJustPressed = true;
    }
  }
  function handleDuck(on) {
    if (!running) return;
    ducking = on;
  }

  window.addEventListener('keydown', function (e) {
    if (e.repeat) { if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { e.preventDefault(); } return; }
    var k = e.key;
    if (k === ' ' || k === 'Spacebar' || k === 'ArrowUp' || k === 'w' || k === 'W' || k === 'Enter') {
      e.preventDefault();
      if (!running) { startGame(); return; }
      handleJump();
      jumpHeld = true;
    } else if (k === 'ArrowDown' || k === 's' || k === 'S') {
      e.preventDefault();
      handleDuck(true);
    }
  });
  window.addEventListener('keyup', function (e) {
    var k = e.key;
    if (k === ' ' || k === 'Spacebar' || k === 'ArrowUp' || k === 'w' || k === 'W' || k === 'Enter') {
      jumpHeld = false;
      // Variable jump: cut upward velocity if key released early
      if (player.vy < -5) player.vy *= 0.55;
    } else if (k === 'ArrowDown' || k === 's' || k === 'S') {
      handleDuck(false);
    }
  });

  // Touch: tap = jump, swipe down = duck
  var touchY = null, touchT = 0;
  canvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    if (!e.touches.length) return;
    touchY = e.touches[0].clientY;
    touchT = Date.now();
    jumpHeld = true;
    if (!running) { startGame(); return; }
  }, { passive: false });
  canvas.addEventListener('touchmove', function (e) {
    if (!e.touches.length || touchY == null) return;
    var dy = e.touches[0].clientY - touchY;
    if (dy > 25) { handleDuck(true); }
  }, { passive: false });
  canvas.addEventListener('touchend', function (e) {
    e.preventDefault();
    var dy = touchY != null && e.changedTouches[0] ? e.changedTouches[0].clientY - touchY : 0;
    if (Math.abs(dy) < 20 && Date.now() - touchT < 300) {
      handleJump();
    }
    handleDuck(false);
    jumpHeld = false;
    if (player.vy < -5) player.vy *= 0.55;
    touchY = null;
  }, { passive: false });
  canvas.addEventListener('mousedown', function (e) {
    if (!running) { startGame(); return; }
    handleJump();
  });

  newBtn.addEventListener('click', startGame);
  ovStart.addEventListener('click', startGame);

  // ---- Game lifecycle ----
  function startGame() {
    running = true;
    gameOver = false;
    speed = baseSpeed;
    distance = 0;
    coins = 0;
    ducking = false;
    obstacles = [];
    coinsList = [];
    clouds = [];
    mountains = [];
    player.y = GROUND_Y - PLAYER_R;
    player.vy = 0;
    player.onGround = true;
    player.anim = 0;
    spawnInitialBackground();
    scoreEl.textContent = '0m';
    coinsEl.textContent = '0';
    hideOverlay();
    _spawnCooldown = 40;
    _coinCooldown = 80;
    _cloudCooldown = 20;
    _mountainCooldown = 100;
  }

  function endGame() {
    running = false;
    gameOver = true;
    var meters = Math.floor(distance / 10);
    if (meters > best) {
      best = meters;
      bestEl.textContent = best + 'm';
      try { localStorage.setItem(BEST_KEY, String(best)); } catch (e) {}
    }
    ovTitle.textContent = 'Dash Over';
    ovLead.textContent = 'Ran ' + meters + 'm, grabbed ' + coins + ' coin' + (coins === 1 ? '' : 's') + '. Best: ' + best + 'm.';
    ovStart.textContent = 'Run Again';
    showOverlay();
  }

  function showOverlay() { overlay.classList.add('show'); }
  function hideOverlay() { overlay.classList.remove('show'); }

  function spawnInitialBackground() {
    // Seed some clouds and mountains
    for (var i = 0; i < 4; i++) {
      clouds.push({
        x: Math.random() * W,
        y: 20 + Math.random() * 70,
        w: 40 + Math.random() * 40,
        speed: 0.3 + Math.random() * 0.6
      });
    }
    for (var j = 0; j < 3; j++) {
      mountains.push({
        x: Math.random() * W,
        h: 60 + Math.random() * 40,
        w: 140 + Math.random() * 80,
        tint: Math.random() * 0.3
      });
    }
  }

  // ---- Spawners ----
  var _spawnCooldown = 40;
  var _coinCooldown = 80;
  var _cloudCooldown = 20;
  var _mountainCooldown = 100;

  function updateSpawners(dt) {
    _spawnCooldown -= speed * dt;
    _coinCooldown -= speed * dt;
    _cloudCooldown -= dt * 60;
    _mountainCooldown -= dt * 60;

    if (_spawnCooldown <= 0) {
      var roll = Math.random();
      if (roll < 0.55) {
        // Bear on ground
        spawnBear();
      } else if (roll < 0.82) {
        // Drone in air
        spawnDrone();
      } else {
        // Double bear
        spawnBear(0);
        spawnBear(38);
      }
      _spawnCooldown = 45 + Math.random() * 45 + Math.max(0, 40 - speed * 2);
    }

    if (_coinCooldown <= 0) {
      spawnCoinLine();
      _coinCooldown = 100 + Math.random() * 120;
    }

    if (_cloudCooldown <= 0) {
      clouds.push({
        x: W + 40,
        y: 20 + Math.random() * 90,
        w: 40 + Math.random() * 40,
        speed: 0.3 + Math.random() * 0.7
      });
      _cloudCooldown = 60 + Math.random() * 80;
    }

    if (_mountainCooldown <= 0) {
      mountains.push({
        x: W + 100,
        h: 60 + Math.random() * 50,
        w: 140 + Math.random() * 100,
        tint: Math.random() * 0.3
      });
      _mountainCooldown = 80 + Math.random() * 160;
    }
  }

  function spawnBear(offset) {
    offset = offset || 0;
    var h = 32 + Math.random() * 10;
    obstacles.push({
      type: 'bear',
      x: W + offset,
      y: GROUND_Y - h,
      w: 34,
      h: h,
      anim: 0
    });
  }

  function spawnDrone() {
    // Two heights: low-ish to force duck, or high (jump-safe)
    var h = 26;
    var yLow = GROUND_Y - 58;  // duck-level
    var yHigh = GROUND_Y - 100; // jump-overable
    var y = Math.random() < 0.65 ? yLow : yHigh;
    obstacles.push({
      type: 'drone',
      x: W + 20,
      y: y,
      w: 42,
      h: h,
      anim: 0
    });
  }

  function spawnCoinLine() {
    var count = 3 + Math.floor(Math.random() * 4);
    var arc = Math.random() < 0.5;
    var startX = W + 10;
    var baseY = GROUND_Y - 60 - Math.random() * 30;
    for (var i = 0; i < count; i++) {
      var y = arc
        ? baseY - Math.sin((i / (count - 1)) * Math.PI) * 40
        : baseY;
      coinsList.push({ x: startX + i * 28, y: y, r: 9, picked: false, wob: Math.random() * Math.PI * 2 });
    }
  }

  // ---- Loop ----
  var lastTime = 0;
  function frame(now) {
    if (!lastTime) lastTime = now;
    var dt = Math.min(0.04, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  function update(dt) {
    if (running) {
      // Speed ramp
      speed = baseSpeed + Math.min(7.5, distance / 900);
      distance += speed;
      scoreEl.textContent = Math.floor(distance / 10) + 'm';

      // Player physics
      player.vy += GRAVITY;
      player.y += player.vy;
      if (player.y + PLAYER_R >= GROUND_Y) {
        player.y = GROUND_Y - PLAYER_R;
        player.vy = 0;
        player.onGround = true;
      }
      player.anim += speed * dt * 6;

      // Spawners
      updateSpawners(dt);

      // Move obstacles and coins
      for (var i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= speed;
        obstacles[i].anim += dt * 10;
        if (obstacles[i].x + obstacles[i].w < -20) obstacles.splice(i, 1);
      }
      for (var c = coinsList.length - 1; c >= 0; c--) {
        coinsList[c].x -= speed;
        coinsList[c].wob += dt * 4;
        if (coinsList[c].x < -20) coinsList.splice(c, 1);
      }

      // Collision
      var pRect = playerRect();
      for (var o = 0; o < obstacles.length; o++) {
        var ob = obstacles[o];
        if (rectsOverlap(pRect, { x: ob.x + 2, y: ob.y + 2, w: ob.w - 4, h: ob.h - 4 })) {
          return endGame();
        }
      }
      for (var ci = 0; ci < coinsList.length; ci++) {
        var co = coinsList[ci];
        if (co.picked) continue;
        var dx = (pRect.x + pRect.w / 2) - co.x;
        var dy = (pRect.y + pRect.h / 2) - co.y;
        if (Math.hypot(dx, dy) < co.r + PLAYER_R - 4) {
          co.picked = true;
          coins++;
          coinsEl.textContent = String(coins);
        }
      }
      // Remove picked coins with a small animation
      for (var ci2 = coinsList.length - 1; ci2 >= 0; ci2--) {
        var cc = coinsList[ci2];
        if (cc.picked) {
          cc.y -= 1.5;
          cc.r -= 0.3;
          if (cc.r < 0.5) coinsList.splice(ci2, 1);
        }
      }
    }

    // Background always moves
    var bgSpeed = running ? speed : 1.5;
    for (var cl = clouds.length - 1; cl >= 0; cl--) {
      clouds[cl].x -= clouds[cl].speed + bgSpeed * 0.2;
      if (clouds[cl].x + clouds[cl].w < -40) clouds.splice(cl, 1);
    }
    for (var mn = mountains.length - 1; mn >= 0; mn--) {
      mountains[mn].x -= bgSpeed * 0.4;
      if (mountains[mn].x + mountains[mn].w < -40) mountains.splice(mn, 1);
    }
    if (!running) {
      _cloudCooldown -= dt * 60;
      _mountainCooldown -= dt * 60;
      if (_cloudCooldown <= 0) {
        clouds.push({ x: W + 40, y: 20 + Math.random() * 90, w: 40 + Math.random() * 40, speed: 0.3 + Math.random() * 0.6 });
        _cloudCooldown = 80;
      }
      if (_mountainCooldown <= 0) {
        mountains.push({ x: W + 100, h: 60 + Math.random() * 50, w: 140 + Math.random() * 100, tint: Math.random() * 0.3 });
        _mountainCooldown = 180;
      }
    }
  }

  function playerRect() {
    var r = PLAYER_R;
    if (ducking && player.onGround) {
      return { x: player.x - r + 2, y: player.y + r - 18, w: r * 2 - 4, h: 20 };
    }
    return { x: player.x - r + 3, y: player.y - r + 3, w: r * 2 - 6, h: r * 2 - 6 };
  }

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  // ---- Drawing ----
  function draw() {
    // Sky gradient
    var sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    sky.addColorStop(0, '#B6E5FF');
    sky.addColorStop(1, '#FFE8A3');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, GROUND_Y);

    // Sun
    ctx.fillStyle = '#FFC233';
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.arc(W - 70, 55, 26, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.arc(W - 70, 55, 40, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Mountains
    for (var m = 0; m < mountains.length; m++) {
      var mm = mountains[m];
      ctx.fillStyle = 'rgba(43, 42, 107, ' + (0.4 + mm.tint) + ')';
      ctx.beginPath();
      ctx.moveTo(mm.x, GROUND_Y);
      ctx.lineTo(mm.x + mm.w / 2, GROUND_Y - mm.h);
      ctx.lineTo(mm.x + mm.w, GROUND_Y);
      ctx.closePath();
      ctx.fill();
      // Snow cap
      ctx.fillStyle = 'rgba(255, 246, 224, 0.6)';
      ctx.beginPath();
      ctx.moveTo(mm.x + mm.w / 2 - 8, GROUND_Y - mm.h + 14);
      ctx.lineTo(mm.x + mm.w / 2, GROUND_Y - mm.h);
      ctx.lineTo(mm.x + mm.w / 2 + 8, GROUND_Y - mm.h + 14);
      ctx.closePath();
      ctx.fill();
    }

    // Clouds
    for (var cl = 0; cl < clouds.length; cl++) {
      drawCloud(clouds[cl]);
    }

    // Ground
    ctx.fillStyle = '#E0B770';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.fillStyle = 'rgba(138, 92, 33, 0.35)';
    ctx.fillRect(0, GROUND_Y, W, 3);
    // Ground hash lines (scrolling)
    ctx.strokeStyle = 'rgba(138, 92, 33, 0.55)';
    ctx.lineWidth = 1.5;
    var hashOffset = -((distance * 0.8) % 40);
    for (var hg = 0; hg < W / 40 + 2; hg++) {
      ctx.beginPath();
      ctx.moveTo(hashOffset + hg * 40, GROUND_Y + 18);
      ctx.lineTo(hashOffset + hg * 40 + 14, GROUND_Y + 18);
      ctx.stroke();
    }

    // Coins
    for (var ci = 0; ci < coinsList.length; ci++) {
      drawCoin(coinsList[ci]);
    }

    // Obstacles
    for (var ob = 0; ob < obstacles.length; ob++) {
      var o = obstacles[ob];
      if (o.type === 'bear') drawBear(o);
      else drawDrone(o);
    }

    // Player
    drawPlayer();
  }

  function drawCloud(c) {
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.beginPath();
    ctx.arc(c.x, c.y, 14, 0, Math.PI * 2);
    ctx.arc(c.x + 14, c.y - 4, 16, 0, Math.PI * 2);
    ctx.arc(c.x + 30, c.y, 14, 0, Math.PI * 2);
    ctx.arc(c.x + c.w, c.y + 2, 12, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawCoin(c) {
    var y = c.y + Math.sin(c.wob) * 2;
    var g = ctx.createRadialGradient(c.x - 3, y - 3, 1, c.x, y, c.r + 1);
    g.addColorStop(0, '#FFF6E0');
    g.addColorStop(0.5, '#FFC233');
    g.addColorStop(1, '#8a5c06');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(c.x, y, c.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#8a5c06';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(c.x, y, c.r, 0, Math.PI * 2);
    ctx.stroke();
    if (c.r > 3) {
      ctx.fillStyle = '#2B2A6B';
      ctx.font = 'bold ' + Math.round(c.r * 1.2) + 'px Georgia';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('L', c.x, y + 1);
    }
  }

  function drawBear(o) {
    // Red bear body — compact capsule with snout, ears, angry eyes
    var x = o.x + o.w / 2;
    var y = o.y + o.h / 2;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x, GROUND_Y + 2, o.w / 2 + 2, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // Body
    ctx.fillStyle = '#B8382A';
    roundRect(ctx, o.x + 2, o.y + 4, o.w - 4, o.h - 4, 8, true, false);
    // Head
    ctx.fillStyle = '#E63946';
    ctx.beginPath();
    ctx.arc(x, o.y + 6, 10, 0, Math.PI * 2);
    ctx.fill();
    // Ears
    ctx.fillStyle = '#8b1f1f';
    ctx.beginPath(); ctx.arc(x - 8, o.y + 2, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 8, o.y + 2, 4, 0, Math.PI * 2); ctx.fill();
    // Eyes (angry)
    ctx.fillStyle = '#FFF6E0';
    ctx.beginPath(); ctx.arc(x - 3, o.y + 5, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 3, o.y + 5, 1.5, 0, Math.PI * 2); ctx.fill();
    // Snout
    ctx.fillStyle = '#8b1f1f';
    ctx.beginPath(); ctx.arc(x, o.y + 10, 3, 0, Math.PI * 2); ctx.fill();
    // Legs (shuffle anim)
    var lf = Math.sin(o.anim * 3);
    ctx.fillStyle = '#8b1f1f';
    ctx.fillRect(o.x + 4, o.y + o.h - 8 + lf * 1.5, 5, 8);
    ctx.fillRect(o.x + o.w - 9, o.y + o.h - 8 - lf * 1.5, 5, 8);
    // Down arrow label on chest
    ctx.fillStyle = '#FFF6E0';
    ctx.font = 'bold 10px Georgia';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u2193', x, o.y + 18);
  }

  function drawDrone(o) {
    var x = o.x + o.w / 2;
    var y = o.y + o.h / 2 + Math.sin(o.anim * 2) * 2;
    // Shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(x, GROUND_Y + 2, 14, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Body
    var g = ctx.createLinearGradient(0, o.y, 0, o.y + o.h);
    g.addColorStop(0, '#7A5EF0');
    g.addColorStop(1, '#3A3988');
    ctx.fillStyle = g;
    roundRect(ctx, o.x + 5, y - 8, o.w - 10, 16, 5, true, false);
    // Rotors
    ctx.strokeStyle = 'rgba(255,246,224,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(o.x, y - 10); ctx.lineTo(o.x + 14, y - 10);
    ctx.moveTo(o.x + o.w - 14, y - 10); ctx.lineTo(o.x + o.w, y - 10);
    ctx.stroke();
    // stETH sticker
    ctx.fillStyle = '#FFC233';
    ctx.font = 'bold 9px Georgia';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('stETH', x, y);
  }

  function drawPlayer() {
    var x = player.x, y = player.y;
    var duck = ducking && player.onGround;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(x, GROUND_Y + 2, PLAYER_R - 2, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(x, y);
    if (duck) ctx.scale(1.15, 0.65);
    // Coin body
    var g = ctx.createRadialGradient(-6, -6, 2, 0, 0, PLAYER_R);
    g.addColorStop(0, '#FFF6E0');
    g.addColorStop(0.5, '#FFC233');
    g.addColorStop(1, '#8a5c06');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(0, 0, PLAYER_R, 0, Math.PI * 2);
    ctx.fill();
    // Red cap
    ctx.fillStyle = '#E63946';
    ctx.beginPath();
    ctx.arc(0, -PLAYER_R + 4, PLAYER_R - 2, Math.PI, 0, false);
    ctx.lineTo(PLAYER_R - 2, -PLAYER_R + 7);
    ctx.lineTo(-(PLAYER_R - 2), -PLAYER_R + 7);
    ctx.closePath();
    ctx.fill();
    // Cap "L"
    ctx.fillStyle = '#FFF6E0';
    ctx.font = 'bold 11px Georgia';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('L', 0, -PLAYER_R + 2);
    // Eyes
    ctx.fillStyle = '#2B2A6B';
    ctx.beginPath();
    ctx.arc(-5, 0, 2.2, 0, Math.PI * 2);
    ctx.arc(5, 0, 2.2, 0, Math.PI * 2);
    ctx.fill();
    // Mustache
    ctx.fillStyle = '#3a2a1a';
    roundRect(ctx, -8, 4, 16, 4, 2, true, false);
    ctx.restore();

    // Running legs below the coin (when on ground, not ducking)
    if (player.onGround && !duck) {
      var legPhase = Math.sin(player.anim * 1.2);
      ctx.fillStyle = '#14143A';
      ctx.fillRect(x - 8, y + PLAYER_R - 2 + legPhase * 2, 4, 6 - Math.abs(legPhase) * 2);
      ctx.fillRect(x + 4, y + PLAYER_R - 2 - legPhase * 2, 4, 6 - Math.abs(legPhase) * 2);
    }
  }

  function roundRect(ctx, x, y, w, h, r, fill, stroke) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  // Initial
  spawnInitialBackground();
  showOverlay();
})();
</script>
