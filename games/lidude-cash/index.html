<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Lidude Cash</title>
<style>
  :root {
    --navy: #2B2A6B;
    --navy-deep: #1E1D52;
    --navy-darker: #14143A;
    --gold: #FFC233;
    --gold-deep: #E8A91B;
    --cream: #FFF6E0;
    --red: #E63946;
    --ink: #14143A;
    --board-bg: #3A3988;
    --cell-bg: rgba(255, 255, 255, 0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(ellipse at top, #3A3988 0%, var(--navy) 35%, var(--navy-darker) 100%);
    color: var(--cream);
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .app {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .shell {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  header.top {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }
  .mascot {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--cream);
    position: relative;
    box-shadow: 0 2px 0 rgba(0,0,0,0.25);
    flex-shrink: 0;
  }
  .mascot::before {
    content: '';
    position: absolute;
    top: -4px; left: 6px; right: 6px;
    height: 18px;
    background: var(--red);
    border-radius: 22px 22px 6px 6px / 22px 22px 6px 6px;
  }
  .mascot::after {
    content: 'L';
    position: absolute;
    top: -2px; left: 0; right: 0;
    text-align: center;
    color: var(--cream);
    font-weight: 900;
    font-size: 12px;
    line-height: 18px;
    z-index: 2;
    text-shadow: 0 1px 0 #a72531;
  }
  .mstache {
    position: absolute;
    left: 8px; right: 8px;
    bottom: 10px;
    height: 6px;
    background: #3a2a1a;
    border-radius: 10px 10px 4px 4px / 8px 8px 3px 3px;
  }
  .title {
    font-family: "Georgia", "Times New Roman", serif;
    font-weight: 900;
    font-size: 22px;
    line-height: 1;
    color: var(--cream);
    letter-spacing: 0.3px;
  }
  .title em {
    font-style: normal;
    color: var(--gold);
  }
  .subtitle {
    font-size: 11px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: rgba(255, 246, 224, 0.55);
    margin-top: 2px;
  }
  .hud {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .stat {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 194, 51, 0.25);
    border-radius: 10px;
    padding: 8px 10px;
    text-align: center;
  }
  .stat .label {
    font-size: 9px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: rgba(255, 246, 224, 0.55);
  }
  .stat .value {
    font-weight: 800;
    font-size: 18px;
    margin-top: 2px;
    color: var(--cream);
    font-variant-numeric: tabular-nums;
  }
  .stat .value.gold { color: var(--gold); }
  .board-wrap {
    position: relative;
    padding: 8px;
    background: linear-gradient(145deg, var(--gold) 0%, var(--gold-deep) 100%);
    border-radius: 18px;
    box-shadow:
      0 0 0 4px var(--navy),
      0 14px 40px rgba(0, 0, 0, 0.45),
      inset 0 1px 0 rgba(255, 255, 255, 0.35),
      inset 0 -2px 0 rgba(0, 0, 0, 0.15);
  }
  .board {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--board-bg);
    border-radius: 12px;
    padding: 12px;
    overflow: hidden;
  }
  .grid {
    position: absolute;
    inset: 12px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: var(--gap);
  }
  .cell {
    background: var(--cell-bg);
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }
  .tiles {
    position: absolute;
    inset: 12px;
  }
  .tile {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-weight: 900;
    font-family: "Georgia", "Times New Roman", serif;
    letter-spacing: -0.5px;
    transition:
      left 120ms cubic-bezier(0.25, 0.8, 0.3, 1),
      top  120ms cubic-bezier(0.25, 0.8, 0.3, 1);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.35),
      inset 0 -2px 0 rgba(0, 0, 0, 0.18),
      0 2px 6px rgba(0, 0, 0, 0.25);
    overflow: hidden;
  }
  .tile .bill-lines {
    position: absolute;
    inset: 0;
    border-radius: 8px;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.18) 0%, transparent 55%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 4px, transparent 4px 8px);
  }
  .tile.appear { animation: pop 180ms ease-out; }
  .tile.merge { animation: merge 180ms ease-out; }
  @keyframes pop {
    0%   { transform: scale(0.2); }
    80%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes merge {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  .tile-2    { background: linear-gradient(160deg, #F5F1E6 0%, #E6DFC6 100%); color: #4a4430; }
  .tile-4    { background: linear-gradient(160deg, #FAE6B0 0%, #E8CC7A 100%); color: #4a3a0d; }
  .tile-8    { background: linear-gradient(160deg, #FFC233 0%, #E8A91B 100%); color: #3a2803; }
  .tile-16   { background: linear-gradient(160deg, #FF9B3C 0%, #DE6E15 100%); color: #fff; }
  .tile-32   { background: linear-gradient(160deg, #E65A4B 0%, #B8382A 100%); color: #fff; }
  .tile-64   { background: linear-gradient(160deg, #D63384 0%, #9D1F62 100%); color: #fff; }
  .tile-128  { background: linear-gradient(160deg, #7A5EF0 0%, #4E38B5 100%); color: #fff; text-shadow: 0 1px 0 rgba(0,0,0,0.25); }
  .tile-256  { background: linear-gradient(160deg, #3A3988 0%, #1E1D52 100%); color: #FFC233; text-shadow: 0 1px 0 rgba(0,0,0,0.4); }
  .tile-512  { background: linear-gradient(160deg, #1F8F7A 0%, #0B5846 100%); color: #FFE8A3; text-shadow: 0 1px 0 rgba(0,0,0,0.4); }
  .tile-1024 { background: linear-gradient(160deg, #128EE0 0%, #0A5B99 100%); color: #FFF6E0; text-shadow: 0 1px 0 rgba(0,0,0,0.4); box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -2px 0 rgba(0,0,0,0.18), 0 2px 10px rgba(18,142,224,0.55); }
  .tile-2048 {
    background: linear-gradient(160deg, #FFC233 0%, #E63946 50%, #7A5EF0 100%);
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -2px 0 rgba(0,0,0,0.25), 0 0 18px rgba(255,194,51,0.75);
    animation: rainbow 3s linear infinite;
  }
  .tile-big {
    background: linear-gradient(160deg, #14143A 0%, #000 100%);
    color: #FFC233;
    text-shadow: 0 0 10px rgba(255,194,51,0.8);
    box-shadow: inset 0 0 0 2px #FFC233, 0 0 18px rgba(255,194,51,0.6);
  }
  @keyframes rainbow {
    0%   { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: space-between;
  }
  .hint {
    font-size: 11px;
    letter-spacing: 0.3px;
    color: rgba(255, 246, 224, 0.55);
    flex: 1;
  }
  button {
    appearance: none;
    border: 0;
    border-radius: 10px;
    padding: 9px 14px;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
    transition: transform 80ms ease, filter 80ms ease;
  }
  button:active { transform: translateY(1px); }
  button.primary {
    background: var(--gold);
    color: var(--ink);
    box-shadow: 0 2px 0 var(--gold-deep), 0 4px 14px rgba(255, 194, 51, 0.25);
  }
  button.primary:hover { filter: brightness(1.05); }
  button.ghost {
    background: rgba(255, 255, 255, 0.08);
    color: var(--cream);
    border: 1px solid rgba(255, 246, 224, 0.25);
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(20, 20, 58, 0.82);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    border-radius: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
    text-align: center;
    padding: 20px;
  }
  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .overlay h2 {
    margin: 0;
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 32px;
    color: var(--gold);
    text-shadow: 0 2px 0 rgba(0,0,0,0.4);
  }
  .overlay .lead {
    font-size: 14px;
    color: var(--cream);
    opacity: 0.88;
    max-width: 280px;
  }
  .overlay .buttons { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

  .floaters {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .floater {
    position: absolute;
    font-weight: 900;
    font-family: "Georgia", serif;
    color: var(--gold);
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    animation: rise 900ms ease-out forwards;
    pointer-events: none;
  }
  @keyframes rise {
    0%   { transform: translateY(0)   scale(0.8); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translateY(-40px) scale(1.2); opacity: 0; }
  }

  footer.foot {
    text-align: center;
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: rgba(255, 246, 224, 0.4);
  }
</style>
<script src="../_shared/lido-rewards.js"></script>
</head>
<body>
<div class="app">
  <div class="shell">
    <header class="top">
      <div class="logo">
        <div class="mascot"><div class="mstache"></div></div>
        <div>
          <div class="title">Lidude <em>Cash</em></div>
          <div class="subtitle">Merge &middot; Stack &middot; Cash Out</div>
        </div>
      </div>
      <button class="ghost" id="newBtn">New Game</button>
    </header>

    <div class="hud">
      <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="stat"><div class="label">Best</div><div class="value gold" id="best">0</div></div>
      <div class="stat"><div class="label">Top Bill</div><div class="value" id="top">$2</div></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board">
        <div class="grid" id="grid"></div>
        <div class="tiles" id="tiles"></div>
        <div class="floaters" id="floaters"></div>
        <div class="overlay" id="overlay">
          <h2 id="ovTitle">Cashed Out</h2>
          <div class="lead" id="ovLead">No moves left. You stacked big.</div>
          <div class="buttons">
            <button class="primary" id="ovAgain">Play Again</button>
            <button class="ghost" id="ovKeep" style="display:none;">Keep Playing</button>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="hint">Arrows / WASD &middot; Swipe on mobile &middot; Merge matching bills to grow the stack.</div>
    </div>

    <footer class="foot">Lido &middot; Super Lidude Cash</footer>
  </div>
</div>

<script>
(function () {
  'use strict';

  var SIZE = 4;
  var BEST_KEY = 'super-lidude-cash:best';

  var grid, tiles, overlay, ovTitle, ovLead, ovAgain, ovKeep, board, floaters;
  var scoreEl, bestEl, topEl, newBtn;
  var board2d;   // SIZE x SIZE, stores tile obj or null
  var tileId = 0;
  var score = 0;
  var best = 0;
  var wonOnce = false;
  var over = false;
  var keepPlaying = false;
  var animating = false;

  function byId(id) { return document.getElementById(id); }

  function init() {
    grid = byId('grid');
    tiles = byId('tiles');
    overlay = byId('overlay');
    ovTitle = byId('ovTitle');
    ovLead = byId('ovLead');
    ovAgain = byId('ovAgain');
    ovKeep = byId('ovKeep');
    board = byId('board');
    floaters = byId('floaters');
    scoreEl = byId('score');
    bestEl = byId('best');
    topEl = byId('top');
    newBtn = byId('newBtn');

    // Cell background grid
    grid.style.setProperty('--gap', '10px');
    for (var i = 0; i < SIZE * SIZE; i++) {
      var c = document.createElement('div');
      c.className = 'cell';
      grid.appendChild(c);
    }

    try { best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0; } catch (e) { best = 0; }
    bestEl.textContent = fmt(best);

    newBtn.addEventListener('click', reset);
    ovAgain.addEventListener('click', reset);
    ovKeep.addEventListener('click', function () {
      keepPlaying = true;
      hideOverlay();
    });

    window.addEventListener('keydown', onKey, { passive: false });
    bindTouch();
    window.addEventListener('resize', relayoutAll);

    reset();
  }

  function reset() {
    board2d = [];
    for (var r = 0; r < SIZE; r++) {
      var row = [];
      for (var c = 0; c < SIZE; c++) row.push(null);
      board2d.push(row);
    }
    tiles.innerHTML = '';
    floaters.innerHTML = '';
    score = 0;
    over = false;
    wonOnce = false;
    keepPlaying = false;
    animating = false;
    scoreEl.textContent = '0';
    topEl.textContent = '$2';
    hideOverlay();

    addRandomTile();
    addRandomTile();
    relayoutAll();
  }

  function fmt(n) { return n.toLocaleString('en-US'); }

  function emptyCells() {
    var out = [];
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        if (!board2d[r][c]) out.push([r, c]);
      }
    }
    return out;
  }

  function addRandomTile() {
    var empty = emptyCells();
    if (!empty.length) return null;
    var pick = empty[Math.floor(Math.random() * empty.length)];
    var value = Math.random() < 0.9 ? 2 : 4;
    var t = makeTile(pick[0], pick[1], value, true);
    board2d[pick[0]][pick[1]] = t;
    return t;
  }

  function makeTile(r, c, value, appear) {
    var el = document.createElement('div');
    el.className = 'tile ' + tileClass(value);
    var label = document.createElement('span');
    label.textContent = labelFor(value);
    var lines = document.createElement('div');
    lines.className = 'bill-lines';
    el.appendChild(lines);
    el.appendChild(label);
    tiles.appendChild(el);
    var t = { id: ++tileId, r: r, c: c, value: value, el: el, label: label };
    positionTile(t, false);
    if (appear) {
      el.classList.add('appear');
      setTimeout(function () { el.classList.remove('appear'); }, 200);
    }
    return t;
  }

  function tileClass(value) {
    if (value <= 1024) return 'tile-' + value;
    if (value === 2048) return 'tile-2048';
    return 'tile-big';
  }

  function labelFor(value) {
    if (value >= 1000) return '$' + (value / 1000).toFixed(value % 1000 === 0 ? 0 : 1) + 'k';
    return '$' + value;
  }

  function tileFontSize(value) {
    // Smaller font for longer labels
    var lbl = labelFor(value);
    var base = cellSize();
    var len = lbl.length;
    var scale = 0.52;
    if (len >= 5) scale = 0.36;
    else if (len === 4) scale = 0.42;
    else if (len === 3) scale = 0.48;
    return Math.round(base * scale);
  }

  function cellSize() {
    var w = board.clientWidth - 24; // minus padding
    var gap = 10;
    return (w - gap * (SIZE - 1)) / SIZE;
  }

  function cellGap() { return 10; }

  function positionTile(t, animate) {
    var size = cellSize();
    var gap = cellGap();
    var x = t.c * (size + gap);
    var y = t.r * (size + gap);
    t.el.style.width = size + 'px';
    t.el.style.height = size + 'px';
    t.el.style.left = x + 'px';
    t.el.style.top = y + 'px';
    t.el.style.fontSize = tileFontSize(t.value) + 'px';
  }

  function relayoutAll() {
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        var t = board2d[r][c];
        if (t) positionTile(t, false);
      }
    }
  }

  // Direction: 0=up, 1=right, 2=down, 3=left
  function move(dir) {
    if (animating || over) return;
    var moved = false;
    var mergeScore = 0;
    var topValBefore = topValue();

    var order = traversalOrder(dir);
    var dr = [-1, 0, 1, 0][dir];
    var dc = [0, 1, 0, -1][dir];

    // Clear merged-from references
    for (var r = 0; r < SIZE; r++) for (var c = 0; c < SIZE; c++) {
      if (board2d[r][c]) board2d[r][c].mergedFrom = null;
    }

    var toRemove = [];
    var toMerge = [];

    for (var i = 0; i < order.length; i++) {
      var pos = order[i];
      var t = board2d[pos[0]][pos[1]];
      if (!t) continue;
      var nr = t.r, nc = t.c;
      // Walk until hitting an edge or tile
      while (true) {
        var tr = nr + dr, tc = nc + dc;
        if (tr < 0 || tr >= SIZE || tc < 0 || tc >= SIZE) break;
        var next = board2d[tr][tc];
        if (!next) { nr = tr; nc = tc; continue; }
        // Can merge if equal value AND that tile hasn't been merged this turn
        if (next.value === t.value && !next.mergedFrom) {
          // Move to target, mark merge
          board2d[t.r][t.c] = null;
          var newValue = t.value * 2;
          next.mergedFrom = [t, next];
          toMerge.push({ keeper: next, newValue: newValue, eater: t });
          nr = tr; nc = tc;
          moved = true;
          mergeScore += newValue;
          toRemove.push(t);
          t.r = tr; t.c = tc;
          break;
        }
        break;
      }
      if (!toRemove.includes(t)) {
        if (nr !== t.r || nc !== t.c) {
          board2d[t.r][t.c] = null;
          t.r = nr; t.c = nc;
          board2d[nr][nc] = t;
          moved = true;
        }
      }
    }

    if (!moved) return;

    animating = true;

    // Animate movement
    for (var r = 0; r < SIZE; r++) for (var c = 0; c < SIZE; c++) {
      if (board2d[r][c]) positionTile(board2d[r][c], true);
    }
    // Also animate tiles that were absorbed (they slide to destination)
    toRemove.forEach(function (t) {
      positionTile(t, true);
      // put the absorbed tile on top of its target
      t.el.style.zIndex = '1';
    });

    setTimeout(function () {
      // Apply merges: upgrade keeper, remove eater
      toMerge.forEach(function (m) {
        m.keeper.value = m.newValue;
        m.keeper.el.className = 'tile ' + tileClass(m.newValue);
        m.keeper.label.textContent = labelFor(m.newValue);
        m.keeper.el.style.fontSize = tileFontSize(m.newValue) + 'px';
        m.keeper.el.classList.add('merge');
        setTimeout((function (el) { return function () { el.classList.remove('merge'); }; })(m.keeper.el), 200);
        // Remove eater
        if (m.eater.el && m.eater.el.parentNode) m.eater.el.parentNode.removeChild(m.eater.el);
        // Floating score
        spawnFloater('+' + m.newValue, m.keeper);
      });

      score += mergeScore;
      scoreEl.textContent = fmt(score);
      if (score > best) {
        best = score;
        bestEl.textContent = fmt(best);
        try { localStorage.setItem(BEST_KEY, String(best)); } catch (e) {}
      }

      var topV = topValue();
      topEl.textContent = labelFor(topV);

      // Spawn a new tile
      addRandomTile();

      // Win check
      if (!wonOnce && !keepPlaying && topV >= 2048) {
        wonOnce = true;
        showWin();
      } else if (!hasMoves()) {
        over = true;
        showGameOver();
      }

      animating = false;
    }, 130);
  }

  function traversalOrder(dir) {
    // Build positions to iterate so tiles furthest in the moving direction go first.
    var rs = [], cs = [];
    for (var i = 0; i < SIZE; i++) { rs.push(i); cs.push(i); }
    if (dir === 2) rs.reverse();   // down: iterate from bottom row up
    if (dir === 1) cs.reverse();   // right: iterate from right col left
    var out = [];
    for (var r = 0; r < rs.length; r++) {
      for (var c = 0; c < cs.length; c++) {
        out.push([rs[r], cs[c]]);
      }
    }
    return out;
  }

  function topValue() {
    var m = 0;
    for (var r = 0; r < SIZE; r++) for (var c = 0; c < SIZE; c++) {
      var t = board2d[r][c];
      if (t && t.value > m) m = t.value;
    }
    return m || 2;
  }

  function hasMoves() {
    if (emptyCells().length) return true;
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        var v = board2d[r][c].value;
        if (r + 1 < SIZE && board2d[r + 1][c].value === v) return true;
        if (c + 1 < SIZE && board2d[r][c + 1].value === v) return true;
      }
    }
    return false;
  }

  function spawnFloater(text, tile) {
    var f = document.createElement('div');
    f.className = 'floater';
    f.textContent = text;
    var size = cellSize();
    var gap = cellGap();
    var x = tile.c * (size + gap) + size / 2;
    var y = tile.r * (size + gap) + size / 2;
    f.style.left = x + 'px';
    f.style.top = y + 'px';
    f.style.fontSize = Math.round(size * 0.32) + 'px';
    f.style.transform = 'translate(-50%, -50%)';
    floaters.appendChild(f);
    setTimeout(function () {
      if (f.parentNode) f.parentNode.removeChild(f);
    }, 950);
  }

  function showGameOver() {
    ovTitle.textContent = 'Cashed Out';
    ovLead.textContent = 'No moves left. Final haul: $' + fmt(score) + '.';
    ovKeep.style.display = 'none';
    overlay.classList.add('show');
  }
  function showWin() {
    ovTitle.textContent = 'Stack of $2,048!';
    ovLead.textContent = 'You hit the big bill. Keep playing to chase a bigger stack.';
    ovKeep.style.display = '';
    overlay.classList.add('show');
  }
  function hideOverlay() {
    overlay.classList.remove('show');
  }

  // Input
  function onKey(e) {
    var k = e.key;
    var dir = -1;
    if (k === 'ArrowUp' || k === 'w' || k === 'W') dir = 0;
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') dir = 1;
    else if (k === 'ArrowDown' || k === 's' || k === 'S') dir = 2;
    else if (k === 'ArrowLeft' || k === 'a' || k === 'A') dir = 3;
    if (dir < 0) return;
    e.preventDefault();
    move(dir);
  }

  function bindTouch() {
    var sx = 0, sy = 0, tracking = false;
    board.addEventListener('touchstart', function (e) {
      if (!e.touches.length) return;
      sx = e.touches[0].clientX;
      sy = e.touches[0].clientY;
      tracking = true;
    }, { passive: true });
    board.addEventListener('touchend', function (e) {
      if (!tracking) return;
      tracking = false;
      var t = e.changedTouches[0];
      if (!t) return;
      var dx = t.clientX - sx;
      var dy = t.clientY - sy;
      var adx = Math.abs(dx), ady = Math.abs(dy);
      if (Math.max(adx, ady) < 20) return;
      if (adx > ady) {
        move(dx > 0 ? 1 : 3);
      } else {
        move(dy > 0 ? 2 : 0);
      }
    }, { passive: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
